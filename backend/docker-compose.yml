services:
  postgres:
    image: postgres:16-alpine
    container_name: hcp-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hcp_crm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - hcp_crm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hcp_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hcp_crm_postgres_data:
